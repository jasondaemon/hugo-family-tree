services:
  public-web:
    image: nginx:alpine
    container_name: hugo-family-tree-web
    restart: unless-stopped
    volumes:
      - ./public:/usr/share/nginx/html:ro
      - ./nginx/public.conf:/etc/nginx/conf.d/default.conf:ro
      - ./nginx/entrypoint.d:/docker-entrypoint.d:ro
    expose:
      - "80"
    # ports:
    #   - "8088:80"
    # NPM will proxy to this by container name over the compose network
    depends_on:
      - hugo-builder
    networks:
      - npm
      - default

  admin:
    build: ./admin
    container_name: hugo-family-tree-admin
    restart: unless-stopped
    environment:
      SRC_ROOT: /src
      # builder endpoint inside docker network
      BUILD_ENDPOINT: http://hugo-builder:19000/build
      # Optional: for generating public links in the UI
      PUBLIC_BASE_URL: https://daemon.family
    volumes:
      - ./src:/src
      # optional convenience so admin can read build manifest/logs
      - ./public:/public:ro
    expose:
      - "80"   # admin listens on 80 in-container (see Dockerfile/app below)
    # ports:
    #   - "18081:80"
    depends_on:
      - hugo-builder
    networks:
      - npm
      - default

  hugo-builder:
    build: ./builder
    container_name: hugo-family-tree-builder
    restart: unless-stopped
    environment:
      SRC_ROOT: /src
      PUBLIC_DIR: /public
      TMP_DIR: /public_tmp
      PREV_DIR: /public_prev
      HUGO_ENV: production
      # optional extra args
      # HUGO_ARGS: "--minify"
    volumes:
      - ./src:/src:ro
      - ./public:/public
      - ./public_tmp:/public_tmp
      - ./public_prev:/public_prev
    expose:
      - "19000"
    # ports:
    #   - "19000:19000"
    networks:
      - default

networks:
  npm:
    external: true
    name: nginx-proxy-manager_default
